<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F1720" />
    <title>for oba</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Noto+Serif+TC:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero fade-in">
        <img src="assets/logo.svg" alt="for oba logo" class="logo" />
        <p class="eyebrow">for the people who stayed beside oba</p>
        <h1>謝謝你們曾經拼命想把牠留下來</h1>
      </header>

      <section class="songs fade-in" aria-label="Songs memorial list">
        <h2>紀錄每一段還想努力的瞬間</h2>
        <div id="song-list" class="song-list" role="list"></div>
      </section>

      <footer class="closing fade-in">
        <p>「謝謝每一位曾經照顧歐巴的人」</p>
      </footer>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
