<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>KARBØN X GAIA | KAYON STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #ffffff; scroll-behavior: smooth; }
        
        /* 核心修正：確保 Banner 臉部不被裁切 */
        #carousel-img { 
            transition: opacity 0.8s ease-in-out; 
            object-fit: cover;
            /* 關鍵設定：center 代表水平置中，10% 代表垂直方向從頂部稍微留一點空間開始顯示，有效保護臉部 */
            object-position: center 10% !important; 
            width: 100%;
            height: 100%;
        }
        
        /* 增加手機版的優化，避免直式螢幕切到臉 */
        @media (max-width: 768px) {
            #carousel-img {
                object-position: center 5% !important;
            }
        }

        .hero-overlay { background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 60%, transparent 100%); }
        .animate-fadeIn { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .music-toggle { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; background: rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 9999; transition: transform 0.3s; }
        .music-toggle:hover { transform: scale(1.1); }
        .music-toggle svg { width: 24px; height: 24px; fill: white; }

        .header-logo { height: 32px; width: auto; filter: brightness(0); }
    </style>
</head>
<body class="overflow-x-hidden">

    <audio id="bgm" loop preload="auto"><source src="bgm.mp3/kayonstudio.mp3" type="audio/mpeg"></audio>
    <div id="musicBtn" class="music-toggle"></div>

    <header class="fixed w-full top-0 bg-white/95 backdrop-blur-md z-[100] border-b border-gray-100 px-6 py-4">
        <nav class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="#" class="flex items-center gap-3 group">
                <img src="logo/logo-mian.png" alt="Logo" class="header-logo">
                <span class="text-lg md:text-xl font-extrabold italic tracking-tighter uppercase text-black flex items-center">
                    KARBØN X GAIA 
                    <span class="mx-3 text-gray-300 font-light italic text-lg">|</span> 
                    <span class="text-gray-900">KAYON STUDIO</span>
                </span>
            </a>
            <div class="hidden lg:flex items-center gap-6 text-[10px] font-bold tracking-widest text-gray-500 uppercase">
                <a href="#talents" class="hover:text-black transition-colors">藝人陣容</a>
                <a href="#studio" class="hover:text-black transition-colors">製作委託</a>
                <a href="https://www.instagram.com/kayonstudio_official/" target="_blank" class="hover:text-pink-600 transition-colors">IG</a>
                <a href="#contact" class="hover:text-black transition-colors">聯絡我們</a>
                <a href="https://lin.ee/uqYFa3X" target="_blank" class="bg-black text-white px-5 py-2 rounded-full hover:bg-gray-800 transition-all ml-4">預約製作</a>
            </div>
        </nav>
    </header>

    <section class="relative w-full h-[85vh] md:h-[90vh] bg-black overflow-hidden flex flex-col items-center justify-end pb-20">
        <div class="absolute inset-0">
            <img id="carousel-img" src="talents/luyangan.webp" alt="Artist">
            <div class="absolute inset-0 hero-overlay"></div>
        </div>
        <div class="relative z-30 text-center px-4 w-full max-w-4xl">
            <h2 class="text-white/60 text-[10px] tracking-[0.6em] font-medium mb-4 uppercase">Featured Artist</h2>
            <h1 id="artist-name" class="text-white text-6xl md:text-8xl font-black tracking-[0.1em] uppercase italic leading-tight mb-6">劉揚安</h1>
            <p class="text-white/90 text-sm md:text-base font-light tracking-[0.2em] max-w-2xl mx-auto border-t border-white/20 pt-6">
                「用科技承載靈魂，創造跨越維度的溫暖陪伴」
            </p>
        </div>
    </section>

    <script>
        // 確保輪播清單補全
        const bannerArtists = [
            { name: "劉揚安", img: "talents/luyangan.webp" },
            { name: "EUNA", img: "talents/euna.webp" },
            { name: "NØVEX", img: "talents/novex.webp" },
            { name: "NÄXER", img: "talents/naxer.webp" },
            { name: "JOAH", img: "talents/joah.webp" },
            { name: "LILITHIUM", img: "talents/lilithium.webp" },
            { name: "GAIALYRA", img: "talents/gaialyra.webp" },
            { name: "VRAISY", img: "talents/vraisy.webp" },
            { name: "RÆNE", img: "talents/raene.webp" },
            { name: "RAUN", img: "talents/raun.webp" }
        ];

        let currentIdx = 0;
        const img = document.getElementById('carousel-img');
        const name = document.getElementById('artist-name');

        setInterval(() => {
            currentIdx = (currentIdx + 1) % bannerArtists.length;
            img.style.opacity = '0';
            setTimeout(() => {
                img.src = bannerArtists[currentIdx].img;
                name.innerText = bannerArtists[currentIdx].name;
                img.onload = () => img.style.opacity = '1';
            }, 800);
        }, 5000);
        
        // (其餘 JavaScript 保持不變)
    </script>
</body>
</html>
