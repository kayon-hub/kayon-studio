<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KARBØN X GAIA ✕ KAYON STUDIO</title>

<style>
body {
    margin: 0;
    background: #000;
    font-family: Arial, sans-serif;
}

/* HERO */
.hero {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
}

#carousel-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
    transition: opacity 0.8s ease-in-out;
}

.overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.2), transparent);
}

.content {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: #fff;
}

#artist-name {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<section class="hero">
    <img id="carousel-img" src="/images/luyanganhero-banner.jpg">
    <div class="overlay"></div>
    <div class="content">
        <div>FROM FREQUENCIES TO SOUL</div>
        <div id="artist-name">劉揚安</div>
    </div>
</section>

<script>
const bannerList = [
    { name: "劉揚安", img: "/images/luyanganhero-banner.jpg", pos: "center 20%" },
    { name: "EUNA", img: "/images/eunahero-banner.jpg", pos: "center 15%" },
    { name: "NØVEX", img: "/images/novexhero-banner.jpg", pos: "center 30%" },
    { name: "NÄXER", img: "/images/naxerhero-banner.jpg", pos: "center 35%" },
    { name: "JOAH", img: "/images/joahhero-banner.jpg", pos: "center 20%" },
    { name: "LILITHIUM", img: "/images/lilithiumhero-banner.jpg", pos: "center 25%" },
    { name: "GAIALYRA", img: "/images/gaialyrahero-banner.jpg", pos: "center 20%" },
    { name: "RÆNE", img: "/images/raenehero-banner.jpg", pos: "center 30%" },
    { name: "RAUN", img: "/images/raunhero-banner.jpg", pos: "center 15%" },
    { name: "VRAISY", img: "/images/vraisyhero-banner.jpg", pos: "center 25%" }
];

let cur = 0;
const bImg = document.getElementById("carousel-img");
const bNm = document.getElementById("artist-name");

function showSlide(i) {
    const artist = bannerList[i];

    bImg.style.opacity = "0";

    setTimeout(() => {
        bImg.src = artist.img;
        bImg.style.objectPosition = artist.pos;
        bNm.innerText = artist.name;

        bImg.onload = function () {
            bImg.style.opacity = "1";
        };

        bImg.onerror = function () {
            bImg.style.opacity = "1";
        };

    }, 600);
}

// 初始化（避免白畫面）
showSlide(0);

// 輪播（4秒）
setInterval(function () {
    cur = (cur + 1) % bannerList.length;
    showSlide(cur);
}, 4000);

</script>

</body>
</html>
