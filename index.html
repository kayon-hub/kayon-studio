<script>

/* TALENTS */
const talentsData=[
{name:"劉揚安",img:"talents/luyangan.webp"},
{name:"NØVEX",img:"talents/novex.webp"},
{name:"NÄXER",img:"talents/naxer.webp"},
{name:"LILITHIUM",img:"talents/lilithium.webp"},
{name:"EUNA",img:"talents/euna.webp"},
{name:"JOAH",img:"talents/joah.webp"}
];

const grid=document.getElementById("talents-grid");
talentsData.forEach(t=>{
grid.innerHTML+=`
<div>
<img src="${t.img}" class="w-full object-cover">
<h3 class="mt-2 font-bold">${t.name}</h3>
</div>`;
});

/* BANNER（唯一修正：lilithium 改成 .png） */
const bannerList = [
{name:"劉揚安", img:"images/luyanganhero-banner.jpg", pos:"center 18%"},
{name:"EUNA", img:"images/eunahero-banner.jpg", pos:"center 12%"},
{name:"NØVEX", img:"images/novexhero-banner.jpg", pos:"center 28%"},
{name:"NÄXER", img:"images/naxerhero-banner.jpg", pos:"center 32%"},
{name:"JOAH", img:"images/joahhero-banner.jpg", pos:"center 18%"},
{name:"LILITHIUM", img:"images/lilithiumhero-banner.png", pos:"center 22%"},
{name:"GAIALYRA", img:"images/gaialyrahero-banner.jpg", pos:"center 18%"},
{name:"RÆNE", img:"images/raenehero-banner.jpg", pos:"center 28%"},
{name:"RAUN", img:"images/raunhero-banner.jpg", pos:"center 12%"},
{name:"VRAISY", img:"images/vraisyhero-banner.jpg", pos:"center 22%"}
];

let cur=0;
const img=document.getElementById("carousel-img");
const name=document.getElementById("artist-name");

function getPos(p){
return window.innerWidth<768 ? "center 8%" : p;
}

function show(i){
img.style.opacity="0";
setTimeout(()=>{
img.src=bannerList[i].img;
img.style.objectPosition=getPos(bannerList[i].pos);
name.innerText=bannerList[i].name;
img.style.opacity="1";
},500);
}

show(0);

setInterval(()=>{
cur=(cur+1)%bannerList.length;
show(cur);
},4000);

</script>
