<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>KARBØN X GAIA ✕ KAYON STUDIO</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@400;900&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Inter','Noto Sans TC',sans-serif;
    background:#fff;
}

/* Banner */
#carousel-img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center 20%;
    transition:opacity .8s ease;
}
</style>
</head>

<body class="overflow-x-hidden">

<!-- HERO -->
<section class="relative w-full h-[100dvh] md:h-[95vh] bg-black overflow-hidden flex items-end justify-center pb-24">

    <div class="absolute inset-0">
        <img id="carousel-img" src="images/luyanganhero-banner.jpg">
    </div>

    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>

    <div class="relative z-30 text-center px-6 md:px-4 max-w-5xl">
        <h2 class="text-white/60 text-[10px] tracking-[0.3em] md:tracking-[0.8em] mb-6 uppercase">
            From Frequencies to Soul
        </h2>

        <h1 id="artist-name"
        class="text-white text-4xl sm:text-5xl md:text-9xl font-black italic mb-8">
        劉揚安
        </h1>

        <p class="text-white/80 text-xs md:text-lg tracking-[0.2em]">
        從頻率中提取情感，在數據中灌溉靈魂
        </p>
    </div>

</section>

<script>
(function(){

const bannerList = [
    { name:"劉揚安", img:"images/luyanganhero-banner.jpg", pos:"center 18%" },
    { name:"EUNA", img:"images/eunahero-banner.jpg", pos:"center 12%" },
    { name:"NØVEX", img:"images/novexhero-banner.jpg", pos:"center 28%" },
    { name:"NÄXER", img:"images/naxerhero-banner.jpg", pos:"center 32%" },
    { name:"JOAH", img:"images/joahhero-banner.jpg", pos:"center 18%" },
    { name:"LILITHIUM", img:"images/lilithiumhero-banner.jpg", pos:"center 22%" },
    { name:"GAIALYRA", img:"images/gaialyrahero-banner.jpg", pos:"center 18%" },
    { name:"RÆNE", img:"images/raenehero-banner.jpg", pos:"center 28%" },
    { name:"RAUN", img:"images/raunhero-banner.jpg", pos:"center 12%" },
    { name:"VRAISY", img:"images/vraisyhero-banner.jpg", pos:"center 22%" }
];

let cur = 0;

const img = document.getElementById("carousel-img");
const name = document.getElementById("artist-name");

function getPosition(pos){
    return window.innerWidth < 768 ? "center 8%" : pos;
}

function showSlide(i){
    const item = bannerList[i];

    img.style.opacity = "0";

    setTimeout(()=>{
        img.src = item.img;
        img.style.objectPosition = getPosition(item.pos);
        name.innerText = item.name;
        img.style.opacity = "1";
    },500);
}

showSlide(0);

setInterval(()=>{
    cur = (cur + 1) % bannerList.length;
    showSlide(cur);
},4000);

})();
</script>

</body>
</html>
