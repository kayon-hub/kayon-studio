<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KARBØN X GAIA ✕ KAYON STUDIO</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    font-family:sans-serif;
    margin:0;
}

/* Banner */
#carousel-img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center 20%;
    transition:opacity .8s;
}

.hero{height:100dvh}
</style>
</head>

<body class="overflow-x-hidden">

<!-- HEADER -->
<header class="fixed w-full top-0 bg-white z-50 px-6 py-4 border-b">
<div class="flex justify-between">
<div>KARBØN X GAIA ✕ KAYON STUDIO</div>
<div class="hidden md:flex gap-4">
<a href="#talents">Artist</a>
<a href="#studio">Studio</a>
<a href="#video">Works</a>
<a href="#contact">Contact</a>
</div>
</div>
</header>

<!-- HERO（唯一輪播） -->
<section class="hero relative bg-black flex items-end justify-center pb-20">

<img id="carousel-img"
src="images/luyanganhero-banner.jpg"
class="absolute inset-0">

<div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>

<div class="relative text-white text-center">
<h1 id="artist-name" class="text-4xl md:text-8xl font-black">
劉揚安
</h1>
</div>

</section>

<!-- TALENTS -->
<section id="talents" class="py-20 text-center">
<h2>Artist Matrix</h2>
</section>

<!-- STUDIO -->
<section id="studio" class="py-20 bg-black text-white text-center">
<h2>Studio</h2>
</section>

<!-- VIDEO -->
<section id="video" class="py-20 text-center">
<h2>Works</h2>
</section>

<!-- CONTACT -->
<section id="contact" class="py-20 text-center">
<h2>Contact</h2>
</section>

<script>

/* ⭐ 唯一 bannerList（只有一個） */
const bannerList = [
    { name:"劉揚安", img:"images/luyanganhero-banner.jpg", pos:"center 18%" },
    { name:"EUNA", img:"images/eunahero-banner.jpg", pos:"center 12%" },
    { name:"NØVEX", img:"images/novexhero-banner.jpg", pos:"center 28%" },
    { name:"NÄXER", img:"images/naxerhero-banner.jpg", pos:"center 32%" },
    { name:"JOAH", img:"images/joahhero-banner.jpg", pos:"center 18%" },
    { name:"LILITHIUM", img:"images/lilithiumhero-banner.jpg", pos:"center 22%" },
    { name:"GAIALYRA", img:"images/gaialyrahero-banner.jpg", pos:"center 18%" },
    { name:"RÆNE", img:"images/raenehero-banner.jpg", pos:"center 28%" },
    { name:"RAUN", img:"images/raunhero-banner.jpg", pos:"center 12%" },
    { name:"VRAISY", img:"images/vraisyhero-banner.jpg", pos:"center 22%" }
];

let cur = 0;

const img = document.getElementById("carousel-img");
const name = document.getElementById("artist-name");

function getPosition(pos){
    return window.innerWidth < 768 ? "center 8%" : pos;
}

function showSlide(i){
    const item = bannerList[i];

    img.style.opacity = "0";

    setTimeout(()=>{
        img.src = item.img;
        img.style.objectPosition = getPosition(item.pos);
        name.innerText = item.name;
        img.style.opacity = "1";
    },500);
}

showSlide(0);

setInterval(()=>{
    cur = (cur + 1) % bannerList.length;
    showSlide(cur);
},4000);

</script>

</body>
</html>
