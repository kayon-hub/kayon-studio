<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>KARBØN X GAIA</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#000;
      font-family:
      "Orbitron",
      "Noto Sans TC",
      sans-serif;
    }

    /* 主背景 */

    .hero{
      position:relative;

      width:100%;
      height:100vh;

      background-image:url("web_index.webp");

      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;

      overflow:hidden;
    }

    /* 手機版背景 */

    @media(max-width:768px){

      .hero{
        background-image:url("mobile_index.webp");
      }

    }

    /* 可點擊區域 */

    .portal-hitbox{
      position:absolute;

      display:block;

      z-index:10;

      border-radius:28px;

      transition:0.3s ease;
    }

    /* Hover 光感 */

    .portal-hitbox:hover{

      box-shadow:
      0 0 40px rgba(255,215,120,0.25);

      backdrop-filter:blur(2px);
    }

    /* 左邊 STUDIO */

    .studio-hitbox{

      width:32%;
      height:16%;

      left:6%;
      top:48%;
    }

    /* 右邊 UNIVERSE */

    .universe-hitbox{

      width:32%;
      height:16%;

      right:6%;
      top:48%;
    }

    /* 手機版 */

    @media(max-width:768px){

      .studio-hitbox{

        width:78%;
        height:10%;

        left:11%;
        top:63%;
      }

      .universe-hitbox{

        width:78%;
        height:10%;

        left:11%;
        top:76%;
      }

    }

  </style>

</head>

<body>

  <section class="hero">

    <!-- STUDIO -->

    <a
      href="kayon-studio.html"
      class="portal-hitbox studio-hitbox"
      aria-label="ENTER STUDIO"
    ></a>

    <!-- UNIVERSE -->

    <a
      href="kxgent-artist.html"
      class="portal-hitbox universe-hitbox"
      aria-label="EXPLORE THE UNIVERSE"
    ></a>

  </section>

</body>

</html>
