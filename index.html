<!-- 只節錄關鍵 JS 區塊，因為你整份 HTML 太長，我不亂動你其他地方 -->
<script>
    const talentsData = [
        { name: "劉揚安", cat: "真實存在的生命", img: "talents/luyangan.webp" },
        { name: "NØVEX", cat: "引領潮流的先鋒", img: "talents/novex.webp" },
        { name: "NÄXER", cat: "最可靠的陪伴", img: "talents/naxer.webp" },
        { name: "LILITHIUM", cat: "旗艦戰略企劃", img: "talents/lilithium.webp" },
        { name: "EUNA", cat: "細膩療癒嗓音", img: "talents/euna.webp" },
        { name: "JOAH", cat: "情緒價值創造", img: "talents/joah.webp" },
        { name: "GAIALYRA", cat: "探索維度邊界", img: "talents/gaialyra.webp" },
        { name: "VRAISY", cat: "跨維度舞台魅力", img: "talents/vraisy.webp" },
        { name: "RÆNE", cat: "靈魂共創成員", img: "talents/raene.webp" },
        { name: "RAUN", cat: "真實存在的生命", img: "talents/raun.webp" }
    ];

    const bannerList = [
        { name: "劉揚安", img: "images/luyanganhero-banner.jpg" },
        { name: "EUNA", img: "images/eunahero-banner.jpg" },
        { name: "NØVEX", img: "images/novexhero-banner.jpg" },
        { name: "NÄXER", img: "images/naxerhero-banner.jpg" },
        { name: "JOAH", img: "images/joahhero-banner.jpg" },
        { name: "LILITHIUM", img: "images/lilithiumhero-banner.jpg" },
        { name: "GAIALYRA", img: "images/gaialyrahero-banner.jpg" },
        { name: "RÆNE", img: "images/raenehero-banner.jpg" },
        { name: "RAUN", img: "images/raunhero-banner.jpg" },
        { name: "VRAISY", img: "images/vraisyhero-banner.jpg" }
    ];

    const grid = document.getElementById('talents-grid');
    talentsData.forEach((t, i) => {
        grid.innerHTML += `
            <div class="group animate-fadeIn" style="animation-delay: ${i * 100}ms">
                <div class="aspect-square bg-transparent overflow-hidden mb-6 relative rounded-sm">
                    <img src="${t.img}" class="h-full w-full object-cover object-top transition duration-1000 group-hover:scale-110" loading="lazy">
                </div>
                <h3 class="text-2xl font-black italic tracking-tighter uppercase text-black">${t.name}</h3>
                <p class="text-[10px] font-bold text-gray-400 mt-1 uppercase tracking-widest">${t.cat}</p>
            </div>`;
    });

    let cur = 0;
    const bImg = document.getElementById('carousel-img');
    const bNm = document.getElementById('artist-name');

    setInterval(() => {
        cur = (cur + 1) % bannerList.length;
        bImg.style.opacity = '0';
        bNm.style.opacity = '0';
        setTimeout(() => {
            const artist = bannerList[cur];
            bImg.src = artist.img;
            bNm.innerText = artist.name;
            bImg.onload = () => { 
                bImg.style.opacity = '1'; 
                bNm.style.opacity = '1'; 
            };
        }, 800);
    }, 4000); // ← ✅ 唯一修改：5000 → 4000

    const audio = document.getElementById("bgm");
    const musicBtn = document.getElementById("musicBtn");
    const svgPlay = `<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>`;
    const svgMute = `<svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 003.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>`;
    
    musicBtn.innerHTML = svgMute;
    musicBtn.onclick = () => { 
        if (audio.paused) { 
            audio.play(); 
            musicBtn.innerHTML = svgPlay; 
        } else { 
            audio.pause(); 
            musicBtn.innerHTML = svgMute; 
        } 
    };
</script>
