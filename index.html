<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>KAYON STUDIO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f0f;
  color: #fff;
  line-height: 1.7;
}

section {
  padding: 80px 20px;
  max-width: 1000px;
  margin: auto;
}

h1, h2 {
  text-align: center;
}

.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
  background-image: url("https://images.unsplash.com/photo-1511379938547-c1f69419868d");
  background-size: cover;
  background-position: center;
  position: relative;
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
}

.hero * {
  position: relative;
  z-index: 1;
}

.hero h1 {
  font-size: 42px;
}

.hero p {
  margin-top: 20px;
  opacity: 0.8;
}

/* 精緻按鈕 */
.btn {
  display: inline-block;
  margin-top: 24px;
  padding: 10px 22px;
  background: #fff;
  color: #000;
  text-decoration: none;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 500;
  transition: 0.3s;
}

.btn:hover {
  opacity: 0.8;
}

.grid {
  display: grid;
  gap: 20px;
}

@media(min-width:768px){
  .grid {
    grid-template-columns: 1fr 1fr;
  }
}

.card {
  margin-top: 30px;
}

iframe {
  width: 100%;
  height: 220px;
  border-radius: 12px;
}

.card p {
  text-align: center;
  opacity: 0.8;
}
</style>
</head>

<body>

<section class="hero">
  <h1>
    有些話 說不出口<br>
    就讓一首歌替你說
  </h1>

  <p>把你的故事 變成一首只屬於你的歌</p>

  <a href="https://line.me/R/ti/p/@702snvsv" class="btn">
    旅程開始
  </a>
</section>

<section>

    不論是愛 回憶 或告別<br>
    都能被轉化成一首專屬於你的作品

      <p>有些結局 不是遺憾 是成為回憶</p>
    </div>

    <div class="card">
      <iframe src="https://www.youtube.com/embed/yyVXVirPXQo?rel=0&modestbranding=1" allowfullscreen></iframe>
      <p>願你在世界的某個角落 好好生活</p>
    </div>

    <div class="card">
      <iframe src="https://www.youtube.com/embed/o-aIw9toVJs?rel=0&modestbranding=1" allowfullscreen></iframe>
      <p>有些傷 來自最親近的人 卻最難說出口</p>
    </div>

  </div>
</section>

<section style="text-align:center;">
  <h2>把你的故事交給我</h2>
  <p>下一首被記住的歌 可能就是你的故事</p>

  <a href="https://line.me/R/ti/p/@702snvsv" class="btn">
    立即用LINE聯絡我
  </a>
</section>

</body>
</html>
