<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARBØN X GAIA | KAYON STUDIO</title>
    <style>
        /* 保持你原始的所有設定 */
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #ffffff; color: #000000; overflow-x: hidden; scroll-behavior: smooth; }
        a { color: #000000; text-decoration: none; transition: all 0.3s; }
        a:hover { opacity: 0.7; }

        #carousel-img { width: 100%; height: 100%; object-fit: cover; object-position: top center !important; transition: opacity 0.8s; }

        .navbar { position: fixed; top: 0; width: 100%; height: 70px; display: flex; justify-content: center; align-items: center; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); z-index: 9999; border-bottom: 1px solid #eee; }
        .nav-group { display: flex; align-items: center; gap: 30px; }
        .logo { height: 38px; cursor: pointer; filter: brightness(0); }

        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: #000; position: relative; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.8)); z-index: 1; }
        .hero-content { position: relative; z-index: 2; color: #fff; }

        section { padding: 100px 20px; max-width: 1000px; margin: 0 auto; text-align: center; }
        
        /* 🎵 音樂按鈕樣式保持不變 */
        .music-toggle { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; background: rgba(0, 0, 0, 0.8); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 9999; }
        .music-toggle svg { width: 26px; height: 26px; fill: white; }
    </style>
</head>

<body>

<audio id="bgm" loop preload="auto"><source src="bgm.mp3/kayonstudio.mp3" type="audio/mpeg"></audio>

<div id="musicBtn" class="music-toggle"></div>

<div class="navbar">
    <div class="nav-group">
        <a href="#talents">藝人陣容</a>
        <a href="#vision">品牌理念</a>
        <a href="#studio">製作委託</a>
        <a href="#" onclick="window.scrollTo(0,0); return false;"><img src="logo/logo-mian.png" class="logo"></a>
        <span style="font-weight: 900; font-style: italic; font-size: 1.2rem;">KARBØN X GAIA | KAYON STUDIO</span>
        <a href="https://www.instagram.com/kayonstudio_official/" target="_blank">IG</a>
        <a href="#contact">聯絡我們</a>
    </div>
</div>

<section class="hero">
    <div class="absolute inset-0 w-full h-full" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
        <img id="carousel-img" src="images/luyanganhero-banner.jpg">
    </div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <h2 style="letter-spacing: 0.5em; font-size: 12px; opacity: 0.7;">FEATURED ARTIST</h2>
        <h1 id="artist-name" style="font-size: 64px; font-weight: 900; font-style: italic; margin: 20px 0;">劉揚安</h1>
        <p style="letter-spacing: 0.2em; opacity: 0.9;">「用科技承載靈魂，創造跨越維度的溫暖陪伴」</p>
    </div>
</section>

<script>
    // 1. 補回 LILITHIUM 與所有藝人資料
    const talents = [
        { name: "NØVEX", cat: "引領潮流的先鋒", img: "talents/novex.webp" },
        { name: "NÄXER", cat: "最可靠的陪伴", img: "talents/naxer.webp" },
        { name: "LILITHIUM", cat: "旗艦戰略企劃", img: "talents/lilithium.webp" },
        { name: "EUNA", cat: "細膩療癒嗓音", img: "talents/euna.webp" },
        { name: "JOAH", cat: "情緒價值創造", img: "talents/joah.webp" },
        { name: "GAIALYRA", cat: "探索維度邊界", img: "talents/gaialyra.webp" },
        { name: "VRAISY", cat: "跨維度舞台魅力", img: "talents/vraisy.webp" },
        { name: "RÆNE", cat: "靈魂共創成員", img: "talents/raene.webp" },
        { name: "RAUN", cat: "真實存在的生命", img: "talents/raun.webp" }
    ];

    // 2. 補回 Banner 輪播清單 (包含 LILITHIUM)
    const bannerList = [
        { name: "劉揚安", img: "images/luyanganhero-banner.jpg" },
        { name: "EUNA", img: "images/eunahero-banner.jpg" },
        { name: "NØVEX", img: "images/novexhero-banner.jpg" },
        { name: "NÄXER", img: "images/naxerhero-banner.jpg" },
        { name: "JOAH", img: "images/joahhero-banner.jpg" },
        { name: "LILITHIUM", img: "images/lilithiumhero-banner.jpg" },
        { name: "GAIALYRA", img: "images/gaialyrahero-banner.jpg" },
        { name: "VRAISY", img: "images/vraisyhero-banner.jpg" },
        { name: "RÆNE", img: "images/raenehero-banner.jpg" },
        { name: "RAUN", img: "images/raunhero-banner.jpg" }
    ];

    // 渲染列表 (保持您調好的排版)
    const grid = document.getElementById('talents-grid');
    if(grid) {
        talents.forEach(t => {
            grid.innerHTML += `
                <div style="text-align: left;">
                    <div style="aspect-ratio: 1/1; background: #eee; overflow: hidden; margin-bottom: 15px;">
                        <img src="${t.img}" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <h3 style="font-weight: 900; font-style: italic; margin: 0;">${t.name}</h3>
                    <p style="font-size: 10px; color: #999;">${t.cat}</p>
                </div>`;
        });
    }

    // 3. 補回播放按鈕 SVG 圖示代碼
    const audio = document.getElementById("bgm");
    const musicBtn = document.getElementById("musicBtn");
    const svgPlay = `<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>`;
    const svgMute = `<svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 003.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>`;

    musicBtn.innerHTML = svgMute;

    musicBtn.addEventListener("click", () => {
        if (audio.paused) { 
            audio.play(); 
            musicBtn.innerHTML = svgPlay;
        } else { 
            audio.pause(); 
            musicBtn.innerHTML = svgMute;
        }
    });

    // 輪播動畫邏輯
    let cur = 0;
    setInterval(() => {
        cur = (cur + 1) % bannerList.length;
        const bImg = document.getElementById('carousel-img');
        const bNm = document.getElementById('artist-name');
        if(bImg) {
            bImg.style.opacity = '0';
            setTimeout(() => {
                bImg.src = bannerList[cur].img;
                bNm.innerText = bannerList[cur].name;
                bImg.onload = () => bImg.style.opacity = '1';
            }, 800);
        }
    }, 5000);
</script>

</body>
</html>
