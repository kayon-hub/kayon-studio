<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>KARBØN X GAIA</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#000;
      font-family:
      "Orbitron",
      "Noto Sans TC",
      sans-serif;
    }

    /* 主背景 */

.hero{
  position:relative;

  width:100%;
  height:100vh;

  background-image:url("webindex.webp");

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  overflow:hidden;
}

/* 手機背景 */

@media(max-width:768px){

  .hero{
    background-image:url("mobileindex.webp");
  }

}
    /* 點擊區 */

    .portal-btn{
  position:absolute;

  width:190px;
  height:54px;

  display:flex;
  justify-content:center;
  align-items:center;

  text-decoration:none;

  border:1px solid rgba(255,215,140,0.35);

  background:rgba(0,0,0,0.28);

  backdrop-filter:blur(8px);

  color:#f6d78c;

  font-size:14px;
  letter-spacing:4px;
  font-weight:500;

  border-radius:999px;

  transition:0.35s ease;

  z-index:10;
}

      transform:translateY(-2px);

      border-color:rgba(255,220,160,0.8);

      box-shadow:
      0 0 24px rgba(255,215,120,0.18);

      background:rgba(20,20,20,0.45);
    }

    /* 左邊 */

    .studio-btn{
  left:18%;
  top:72%;
}

    /* 右邊 */

    .universe-btn{
  right:18%;
  top:72%;
}

    /* Footer */

    .footer{
      position:absolute;

      bottom:28px;
      left:50%;

      transform:translateX(-50%);

      color:rgba(255,220,170,0.7);

      font-size:11px;
      letter-spacing:2px;

      z-index:10;

      white-space:nowrap;
    }

    /* 手機版 */

    @media(max-width:768px){

      .portal-btn{

        width:78%;
        height:58px;

        font-size:12px;
        letter-spacing:3px;
      }

      .studio-btn{
  left:18%;
  top:72%;
}

     .universe-btn{
  right:18%;
  top:72%;
}

      .footer{

        width:90%;

        text-align:center;

        font-size:9px;
        line-height:1.6;

        white-space:normal;

        bottom:18px;
      }

    }

  </style>

</head>

<body>

  <section class="hero">

    <!-- STUDIO -->

    <a
      href="kayon-studio.html"
      class="portal-btn studio-btn"
    >
      ENTER STUDIO
    </a>

    <!-- UNIVERSE -->

    <a
      href="kxgent-artist.html"
      class="portal-btn universe-btn"
    >
      EXPLORE UNIVERSE
    </a>

    <!-- FOOTER -->

    <div class="footer">
      © 2026 KARBØN X GAIA ENTERTAINMENT · KAYON STUDIO. All Rights Reserved.
    </div>

  </section>

</body>

</html>
