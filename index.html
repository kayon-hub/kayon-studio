<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Banner</title>

<style>
body {
    margin: 0;
    background: black;
}

/* Hero */
.hero {
    width: 100%;
    height: 100vh;
    position: relative;
    overflow: hidden;
}

#carousel-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
    transition: opacity 0.8s ease;
}

.overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.title {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 60px;
    font-weight: 900;
    letter-spacing: 10px;
}
</style>
</head>

<body>

<div class="hero">
    <!-- ⭐ 先直接有圖（避免白畫面） -->
    <img id="carousel-img" src="images/luyanganhero-banner.jpg">
    
    <div class="overlay"></div>
    <div id="artist-name" class="title">劉揚安</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const bannerList = [
        { name: "劉揚安", img: "images/luyanganhero-banner.jpg", pos: "center 20%" },
        { name: "EUNA", img: "images/eunahero-banner.jpg", pos: "center 15%" },
        { name: "NØVEX", img: "images/novexhero-banner.jpg", pos: "center 30%" }
    ];

    const img = document.getElementById("carousel-img");
    const name = document.getElementById("artist-name");

    if (!img || !name) return;

    let index = 0;

    function showSlide(i) {
        const item = bannerList[i];
        if (!item) return;

        img.style.opacity = "0";

        setTimeout(() => {
            img.src = item.img;
            img.style.objectPosition = item.pos;
            name.innerText = item.name;

            img.onload = () => {
                img.style.opacity = "1";
            };

        }, 500);
    }

    // 初始化（避免白畫面）
    img.src = bannerList[0].img;
    img.style.objectPosition = bannerList[0].pos;
    name.innerText = bannerList[0].name;

    // 輪播
    setInterval(() => {
        index = (index + 1) % bannerList.length;
        showSlide(index);
    }, 4000);

});
</script>

</body>
</html>
