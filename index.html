<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>KAYON STUDIO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f0f0f;
      color: #fff;
      text-align: center;
    }
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 16px;
    }
    p {
      font-size: 16px;
      opacity: 0.8;
    }
    .btn {
      margin-top: 24px;
      padding: 12px 24px;
      background: #fff;
      color: #000;
      text-decoration: none;
      border-radius: 999px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>把你的故事 變成一首只屬於你的歌</h1>
    <p>有些話 說不出口 那就讓一首歌替你說完</p>
    <a href="#" class="btn">告訴我你的故事</a>
  </div>

</body>
</html>
