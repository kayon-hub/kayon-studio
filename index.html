<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>KARBØN X GAIA ✕ KAYON STUDIO</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@400;900&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter','Noto Sans TC',sans-serif;
    background:#fff;
}

/* ⭐ Banner 修正（支援RWD） */
#carousel-img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center 20%;
    transition:opacity .8s ease;
}

/* ⭐ 手機高度修正 */
.hero{
    height:100dvh;
}

/* ⭐ 手機字縮小 */
@media (max-width:768px){
    #artist-name{
        font-size:42px !important;
        letter-spacing:4px !important;
    }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero relative w-full bg-black overflow-hidden flex items-end justify-center pb-16 md:pb-24">

    <div class="absolute inset-0">
        <img id="carousel-img" src="images/luyanganhero-banner.jpg">
    </div>

    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>

    <div class="relative z-20 text-center px-4 max-w-5xl">
        <h2 class="text-white/60 text-[10px] tracking-[0.6em] md:tracking-[0.8em] mb-4 uppercase">
            From Frequencies to Soul
        </h2>

        <h1 id="artist-name"
        class="text-white text-5xl md:text-9xl font-black tracking-[0.1em] uppercase italic leading-tight mb-6">
        劉揚安
        </h1>

        <p class="text-white/80 text-xs md:text-lg tracking-[0.2em]">
        「從頻率中提取情感，在數據中灌溉靈魂」
        </p>
    </div>

</section>

<!-- ⭐ 你原本其他區塊全部保留（這裡省略，但你自己原本有） -->

<script>

/* ⭐ Banner 資料（每張構圖不同） */
const bannerList = [
    { name:"劉揚安", img:"images/luyanganhero-banner.jpg", pos:"center 20%" },
    { name:"EUNA", img:"images/eunahero-banner.jpg", pos:"center 15%" },
    { name:"NØVEX", img:"images/novexhero-banner.jpg", pos:"center 30%" },
    { name:"NÄXER", img:"images/naxerhero-banner.jpg", pos:"center 35%" },
    { name:"JOAH", img:"images/joahhero-banner.jpg", pos:"center 20%" },
    { name:"LILITHIUM", img:"images/lilithiumhero-banner.jpg", pos:"center 25%" },
    { name:"GAIALYRA", img:"images/gaialyrahero-banner.jpg", pos:"center 20%" },
    { name:"RÆNE", img:"images/raenehero-banner.jpg", pos:"center 30%" },
    { name:"RAUN", img:"images/raunhero-banner.jpg", pos:"center 15%" },
    { name:"VRAISY", img:"images/vraisyhero-banner.jpg", pos:"center 25%" }
];

let cur = 0;
const img = document.getElementById("carousel-img");
const name = document.getElementById("artist-name");

function showSlide(i){
    const item = bannerList[i];

    img.style.opacity = "0";

    setTimeout(()=>{
        img.src = item.img;
        img.style.objectPosition = item.pos;
        name.innerText = item.name;

        img.onload = ()=> img.style.opacity="1";
    },500);
}

/* ⭐ 初始化 */
showSlide(0);

/* ⭐ 輪播 */
setInterval(()=>{
    cur = (cur+1) % bannerList.length;
    showSlide(cur);
},4000);

</script>

</body>
</html>
