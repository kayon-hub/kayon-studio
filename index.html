<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KARBØN X GAIA Portal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:100%;
  height:100vh;
  overflow:hidden;
  background:#000;
  font-family:'Orbitron','Noto Sans TC',sans-serif;
}

.hero{
  position:relative;

  width:100%;
  height:100vh;
  min-height:100svh;

  background-image:url("newwebindex.webp");

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  display:grid;
  place-items:center;
  overflow:hidden;
}

.portal-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  position:absolute;
  z-index:2;

  width:180px;
  height:58px;
  padding:0;

  border:1px solid rgba(255,215,120,0.45);
  border-radius:18px;

  background:rgba(0,0,0,0.28);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  box-shadow:
  0 0 22px rgba(255,215,120,0.12),
  inset 0 0 18px rgba(255,215,120,0.05);

  text-decoration:none;
  color:#f5dfaf;
  font-size:28px;
  letter-spacing:6px;
  line-height:1;
  white-space:nowrap;

  transition:.4s;
}

.portal-btn:hover{
  transform:translateX(-50%) translateY(-4px);

  box-shadow:
  0 0 30px rgba(255,215,120,0.2);
}

.studio-btn{
  position:absolute;
  left:25%;
  bottom:120px;
  transform:translateX(-50%);
}

.universe-btn{
  position:absolute;
  left:75%;
  bottom:120px;
  transform:translateX(-50%);
}

@media(max-width:768px){

  body{
    overflow:auto;
  }

  .hero{
    height:auto;
    min-height:100svh;

    padding:72px 20px clamp(56px,9vh,96px);
    align-content:start;
    row-gap:clamp(56px,8vh,88px);

    background-image:url("newmobileindex.webp");

    background-size:cover;
    background-position:center;
  }

  .portal-btn{
    font-size:20px;
    letter-spacing:4px;
  }

  .studio-btn,
  .universe-btn{
    position:absolute;
    bottom:120px;
    transform:translateX(-50%);
  }

  .studio-btn{
    left:25%;
  }

  .universe-btn{
    left:75%;
  }

}

</style>
</head>

<body>

<section class="hero">

<a
  href="kayon-studio.html"
  class="portal-btn studio-btn"
>
  ENTER
</a>

<a
  href="kxgent-artist.html"
  class="portal-btn universe-btn"
>
  ENTER
</a>

</section>

</body>
</html>
