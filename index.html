<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAYON STUDIO</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0f0f0f;
  color:#fff;
}

/* 🔥 Navbar */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  height:80px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(6px);
  transition:all 0.3s ease;
  z-index:9999;
}

.navbar.scrolled{
  height:60px;
  background:rgba(0,0,0,0.9);
}

.nav-group{
  display:flex;
  align-items:center;
  gap:40px;
}

.nav-group a{
  color:#fff;
  text-decoration:none;
  font-size:14px;
  opacity:0.85;
  transition:0.2s;
}

.nav-group a:hover{
  opacity:1;
}

.logo{
  width:160px;
  transition:0.3s;
}

.navbar.scrolled .logo{
  width:120px;
}

/* 🔥 Hero（已換專業錄音室） */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background-image:url("https://images.unsplash.com/photo-1598488035139-bdbb2231ce04");
  background-size:cover;
  background-position:center;
  position:relative;
  padding-top:80px;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
}

.hero *{
  position:relative;
  z-index:1;
}

h1{
  font-size:40px;
}

.btn{
  margin-top:20px;
  padding:12px 24px;
  background:#fff;
  color:#000;
  text-decoration:none;
  border-radius:999px;
}

/* Section */
section{
  padding:80px 20px;
  max-width:1000px;
  margin:auto;
  text-align:center;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar" id="navbar">
  <div class="nav-group">
    <a href="#process">製作流程</a>
    <a href="#works">作品參考</a>

    <img src="logo.png" class="logo">

    <a href="#faq">FAQ</a>
    <a href="https://lin.ee/uqYFa3X">聯絡我們</a>
  </div>
</div>

<!-- Hero -->
<section class="hero">
  <h1>
    有些話 說不出口<br>
    就讓一首歌替你說
  </h1>

  <a href="https://lin.ee/uqYFa3X" class="btn">
    開始你的專屬歌曲
  </a>
</section>

<!-- 流程 -->
<section id="process">
  <h2>製作流程</h2>
  <p>STEP 1 告訴我你的故事</p>
  <p>STEP 2 為你創作專屬歌曲</p>
  <p>STEP 3 完成交付音樂作品</p>
</section>

<!-- 作品 -->
<section id="works">
  <h2>作品參考</h2>
  <iframe width="100%" height="220" src="https://www.youtube.com/embed/sRC7AGxNMV4"></iframe>
</section>

<!-- FAQ -->
<section id="faq">
  <h2>FAQ</h2>
  <p>製作時間：約21–30個工作天</p>
  <p>費用：依需求提供專屬報價</p>
</section>

<script>
window.addEventListener("scroll", function(){
  const navbar = document.getElementById("navbar");
  if(window.scrollY > 50){
    navbar.classList.add("scrolled");
  }else{
    navbar.classList.remove("scrolled");
  }
});
</script>

</body>
</html>
