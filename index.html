<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>KAYON STUDIO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0f0f0f;
  color:#fff;
}

/* 🔥 Navbar */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(6px);
  z-index:9999;
}

.navbar img{
  width:120px;
}

.nav-links a{
  margin-left:20px;
  color:#fff;
  text-decoration:none;
  font-size:14px;
}

/* Section */
section{
  padding:100px 20px;
  max-width:1000px;
  margin:auto;
}

/* Hero */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background-image:url("https://images.unsplash.com/photo-1511379938547-c1f69419868d");
  background-size:cover;
  background-position:center;
  position:relative;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}

.hero *{
  position:relative;
  z-index:1;
}

h1{
  font-size:40px;
}

.btn{
  margin-top:20px;
  padding:12px 24px;
  background:#fff;
  color:#000;
  text-decoration:none;
  border-radius:999px;
}

/* Grid */
.grid{
  display:grid;
  gap:20px;
}

@media(min-width:768px){
  .grid{
    grid-template-columns:1fr 1fr;
  }
}
</style>
</head>

<body>

<!-- 🔥 Navbar -->
<div class="navbar">
  <img src="logo.png">
  <div class="nav-links">
    <a href="#process">流程</a>
    <a href="#works">作品</a>
    <a href="#faq">FAQ</a>
    <a href="https://lin.ee/uqYFa3X">聯絡我</a>
  </div>
</div>

<!-- Hero -->
<section class="hero">
  <h1>
    有些話 說不出口<br>
    就讓一首歌替你說
  </h1>

  <a href="https://lin.ee/uqYFa3X" class="btn">
    開始你的專屬歌曲
  </a>
</section>

<!-- 流程 -->
<section id="process">
  <h2>製作流程</h2>
  <p>STEP 1 告訴我你的故事</p>
  <p>STEP 2 為你創作專屬歌曲</p>
  <p>STEP 3 完成交付音樂作品</p>
</section>

<!-- 作品 -->
<section id="works">
  <h2>作品</h2>
  <div class="grid">
    <iframe src="https://www.youtube.com/embed/sRC7AGxNMV4"></iframe>
    <iframe src="https://www.youtube.com/embed/nwMQyEO4hMw"></iframe>
  </div>
</section>

<!-- FAQ -->
<section id="faq">
  <h2>FAQ</h2>
  <p>製作時間：約21-30天</p>
  <p>費用：依需求報價</p>
</section>

</body>
</html>
