<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KARBØN X GAIA Portal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:100%;
  height:100vh;
  overflow:hidden;
  background:#000;
  font-family:'Orbitron','Noto Sans TC',sans-serif;
}

.hero{
  position:relative;

  width:100%;
  height:100vh;
  min-height:100svh;

  background-image:url("newwebindex.webp");

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  display:grid;
  place-items:center;
  overflow:hidden;
}

@media(max-width:768px){

  body{
    overflow:auto;
  }

  .hero{
    height:auto;
    min-height:100svh;

    padding:72px 20px clamp(56px,9vh,96px);
    align-content:start;
    row-gap:clamp(56px,8vh,88px);

    background-image:url("newmobileindex.webp");

    background-size:cover;
    background-position:center;
  }

}

</style>
</head>

<body>

<section class="hero">

</section>

</body>
</html>
