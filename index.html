<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAYON STUDIO</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0f0f0f;
  color:#fff;
}

/* 🔥 Navbar */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  height:80px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 40px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(6px);
  transition:all 0.3s ease;
  z-index:9999;
}

/* 滾動後狀態 */
.navbar.scrolled{
  height:60px;
  background:rgba(0,0,0,0.9);
}

/* 左右 */
.nav-left, .nav-right{
  display:flex;
  gap:30px;
}

.nav-left a, .nav-right a{
  color:#fff;
  text-decoration:none;
  font-size:14px;
  opacity:0.85;
  transition:0.2s;
}

.nav-left a:hover, .nav-right a:hover{
  opacity:1;
}

/* 中間 LOGO */
.nav-center{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  transition:all 0.3s ease;
}

.nav-center img{
  width:160px;
  transition:all 0.3s ease;
}

/* 滾動縮小 LOGO */
.navbar.scrolled .nav-center img{
  width:110px;
}

/* Hero */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background-image:url("https://images.unsplash.com/photo-1511379938547-c1f69419868d");
  background-size:cover;
  background-position:center;
  position:relative;
  padding-top:80px;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}

.hero *{
  position:relative;
  z-index:1;
}

h1{
  font-size:40px;
}

.btn{
  margin-top:20px;
  padding:12px 24px;
  background:#fff;
  color:#000;
  text-decoration:none;
  border-radius:999px;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar" id="navbar">

  <div class="nav-left">
    <a href="#process">製作流程</a>
    <a href="#works">作品</a>
  </div>

  <div class="nav-center">
    <img src="logo.png">
  </div>

  <div class="nav-right">
    <a href="#faq">FAQ</a>
    <a href="https://lin.ee/uqYFa3X">聯絡我們</a>
  </div>

</div>

<!-- Hero -->
<section class="hero">
  <h1>
    有些話 說不出口<br>
    就讓一首歌替你說
  </h1>

  <a href="https://lin.ee/uqYFa3X" class="btn">
    開始你的專屬歌曲
  </a>
</section>

<script>
window.addEventListener("scroll", function(){
  const navbar = document.getElementById("navbar");
  if(window.scrollY > 50){
    navbar.classList.add("scrolled");
  }else{
    navbar.classList.remove("scrolled");
  }
});
</script>

</body>
</html>
