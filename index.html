<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>KARBØN X GAIA</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#000;
      font-family:
      "Orbitron",
      "Noto Sans TC",
      sans-serif;
    }

    /* 主視覺 */

    .hero{

      position:relative;

      width:100%;
      height:100vh;

      background-image:url("webindex.webp");

      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;

      overflow:hidden;
    }

    /* 手機版背景 */

    @media(max-width:768px){

      .hero{
        background-image:url("mobileindex.webp");
      }

    }

    /* 共用按鈕 */

    .portal-btn{

      position:absolute;

      width:210px;
      height:58px;

      display:flex;
      justify-content:center;
      align-items:center;

      text-decoration:none;

      border:1px solid rgba(255,215,140,0.35);

      background:rgba(0,0,0,0.24);

      backdrop-filter:blur(10px);

      color:#f6d78c;

      font-size:13px;
      letter-spacing:3px;
      font-weight:500;

      border-radius:999px;

      transition:0.35s ease;

      z-index:20;
    }

    /* Hover */

    .portal-btn:hover{

      transform:translateY(-2px);

      border-color:rgba(255,220,160,0.85);

      box-shadow:
      0 0 24px rgba(255,215,120,0.18);

      background:rgba(20,20,20,0.42);
    }

    /* 左邊按鈕 */

    .studio-btn{

      left:15%;
      bottom:17%;
    }

    /* 右邊按鈕 */

    .universe-btn{

      right:15%;
      bottom:17%;
    }

    /* Footer */

    .footer{

      position:absolute;

      bottom:18px;
      left:50%;

      transform:translateX(-50%);

      color:rgba(255,220,170,0.72);

      font-size:10px;
      letter-spacing:2px;

      z-index:20;

      white-space:nowrap;
    }

    /* 手機版 */

    @media(max-width:768px){

      .portal-btn{

        width:76%;
        height:56px;

        left:12% !important;

        font-size:12px;
        letter-spacing:2px;
      }

      .studio-btn{
        bottom:20%;
      }

      .universe-btn{
        bottom:11%;
      }

      .footer{

        width:90%;

        text-align:center;

        white-space:normal;

        font-size:8px;

        line-height:1.7;

        bottom:14px;
      }

    }

  </style>

</head>

<body>

  <section class="hero">

    <!-- STUDIO -->

    <a
      href="kayon-studio.html"
      class="portal-btn studio-btn"
    >
      ENTER STUDIO
    </a>

    <!-- UNIVERSE -->

    <a
      href="kxgent-artist.html"
      class="portal-btn universe-btn"
    >
      EXPLORE UNIVERSE
    </a>

    <!-- Footer -->

    <div class="footer">
      © 2026 KARBØN X GAIA ENTERTAINMENT · KAYON STUDIO. All Rights Reserved.
    </div>

  </section>

</body>

</html>
