<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>KARBØN X GAIA | KAYON STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #ffffff; scroll-behavior: smooth; overflow-x: hidden; }
        
        /* 橫向 Banner 裁切優化：重點保護頭部區域 */
        #carousel-img { 
            transition: opacity 0.8s ease-in-out; 
            object-fit: cover;
            object-position: center 15% !important; 
            width: 100%; height: 100%;
        }
        
        @media (max-width: 768px) {
            #carousel-img { object-position: center 8% !important; }
            .header-brand-text { font-size: 11px; }
        }

        .hero-overlay { background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 60%, transparent 100%); }
        .animate-fadeIn { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .music-toggle { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 9999; }
    </style>
</head>
<body>

    <audio id="bgm" loop preload="auto"><source src="bgm.mp3/kayonstudio.mp3" type="audio/mpeg"></audio>
    <div id="musicBtn" class="music-toggle"></div>

    <header class="fixed w-full top-0 bg-white/95 backdrop-blur-md z-[100] border-b border-gray-100 px-4 py-4">
        <nav class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="#" class="flex items-center gap-3">
                <img src="logo/logo-mian.png" alt="Logo" class="h-8 w-auto">
                <span class="header-brand-text font-extrabold italic tracking-tighter uppercase text-black">
                    KARBØN X GAIA <span class="mx-1 text-gray-300">|</span> <span class="text-gray-900">KAYON STUDIO</span>
                </span>
            </a>
            <div class="hidden lg:flex items-center gap-6 text-[10px] font-bold tracking-widest text-gray-400 uppercase">
                <a href="#talents" class="hover:text-black transition-colors">Artist Matrix</a>
                <a href="#vision" class="hover:text-black transition-colors">Philosophy</a>
                <a href="#studio" class="hover:text-black transition-colors">Studio</a>
                <a href="#contact" class="hover:text-black transition-colors">Contact</a>
                <a href="https://lin.ee/RHRJOIN" target="_blank" class="bg-black text-white px-5 py-2 rounded-full ml-4">預約製作</a>
            </div>
        </nav>
    </header>

    <section class="relative w-full h-[85vh] md:h-[95vh] bg-black overflow-hidden flex flex-col items-center justify-end pb-24">
        <div class="absolute inset-0">
            <img id="carousel-img" src="images/luyanganhero-banner.jpg" alt="Featured Artist">
            <div class="absolute inset-0 hero-overlay"></div>
        </div>
        <div class="relative z-30 text-center px-4 w-full max-w-4xl">
            <h2 class="text-white/60 text-[10px] tracking-[0.6em] font-medium mb-4 uppercase">Featured Artist</h2>
            <h1 id="artist-name" class="text-white text-5xl md:text-8xl font-black tracking-[0.1em] uppercase italic leading-tight mb-6">劉揚安</h1>
            <p class="text-white/90 text-sm md:text-base font-light tracking-[0.2em] max-w-2xl mx-auto border-t border-white/20 pt-6">
                「用科技承載靈魂，創造跨越維度的溫暖陪伴」
            </p>
        </div>
    </section>

    <section id="talents" class="max-w-7xl mx-auto px-6 py-32">
        <div class="mb-16">
            <h2 class="text-4xl md:text-5xl font-black tracking-tighter italic text-black uppercase">Artist Matrix</h2>
            <p class="text-gray-400 font-bold text-[10px] tracking-widest uppercase italic mt-2">賦予生命，而非創造內容</p>
        </div>
        <div id="talents-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-16 md:gap-y-24">
            </div>
    </section>

    <script>
        // 藝人網格資料 (對應 talents/ 目錄下的 .webp)
        const talentsData = [
            { name: "NØVEX", cat: "引領潮流的先鋒", img: "talents/novex.webp" },
            { name: "NÄXER", cat: "最可靠的陪伴", img: "talents/naxer.webp" },
            { name: "LILITHIUM", cat: "旗艦戰略企劃", img: "talents/lilithium.webp" },
            { name: "EUNA", cat: "細膩療癒嗓音", img: "talents/euna.webp" },
            { name: "JOAH", cat: "情緒價值創造", img: "talents/joah.webp" },
            { name: "GAIALYRA", cat: "探索維度邊界", img: "talents/gaialyra.webp" },
            { name: "VRAISY", cat: "跨維度舞台魅力", img: "talents/vraisy.webp" },
            { name: "RÆNE", cat: "靈魂共創成員", img: "talents/raene.webp" },
            { name: "RAUN", cat: "真實存在的生命", img: "talents/raun.webp" }
        ];

        // 輪播 Banner 資料 (對應 images/ 目錄下的 -banner.jpg)
        const bannerList = [
            { name: "劉揚安", img: "images/luyanganhero-banner.jpg" },
            { name: "EUNA", img: "images/eunahero-banner.jpg" },
            { name: "NØVEX", img: "images/novexhero-banner.jpg" },
            { name: "NÄXER", img: "images/naxerhero-banner.jpg" },
            { name: "JOAH", img: "images/joahhero-banner.jpg" },
            { name: "LILITHIUM", img: "images/lilithiumhero-banner.jpg" }
        ];

        // 渲染網格
        const grid = document.getElementById('talents-grid');
        talentsData.forEach((t, i) => {
            grid.innerHTML += `
                <div class="group animate-fadeIn" style="animation-delay: ${i * 100}ms">
                    <div class="aspect-square bg-gray-50 overflow-hidden mb-6 border border-gray-100 relative">
                        <img src="${t.img}" class="h-full w-full object-cover transition duration-700 group-hover:scale-110" loading="lazy">
                    </div>
                    <h3 class="text-xl md:text-2xl font-black italic tracking-tighter uppercase text-black">${t.name}</h3>
                    <p class="text-[10px] font-bold text-gray-400 mt-1 uppercase tracking-widest">${t.cat}</p>
                </div>`;
        });

        // 輪播邏輯
        let cur = 0;
        const bImg = document.getElementById('carousel-img');
        const bNm = document.getElementById('artist-name');

        setInterval(() => {
            cur = (cur + 1) % bannerList.length;
            bImg.style.opacity = '0';
            bNm.style.opacity = '0';
            
            setTimeout(() => {
                bImg.src = bannerList[cur].img;
                bNm.innerText = bannerList[cur].name;
                bImg.onload = () => {
                    bImg.style.opacity = '1';
                    bNm.style.opacity = '1';
                };
            }, 800);
        }, 5000);

        // 背景音樂控制 (與之前一致)
        const audio = document.getElementById("bgm");
        const musicBtn = document.getElementById("musicBtn");
        const svgPlay = `<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>`;
        const svgMute = `<svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 003.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>`;
        musicBtn.innerHTML = svgMute;
        musicBtn.onclick = () => {
            if (audio.paused) { audio.play(); musicBtn.innerHTML = svgPlay; }
            else { audio.pause(); musicBtn.innerHTML = svgMute; }
        };
    </script>
</body>
</html>
