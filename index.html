<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KARBØN X GAIA ✕ KAYON STUDIO</title>

<style>
body {
    margin: 0;
    background: #000;
}

/* HERO */
.hero {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
}

#carousel-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
    transition: opacity 0.8s ease;
}

.overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
}

.content {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: white;
}

#artist-name {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: 10px;
}
</style>
</head>

<body>

<section class="hero">

    <!-- ⭐ 一定要有預設圖 -->
    <img id="carousel-img" src="/images/luyanganhero-banner.jpg">

    <div class="overlay"></div>

    <div class="content">
        <div>FROM FREQUENCIES TO SOUL</div>
        <div id="artist-name">劉揚安</div>
    </div>

</section>

<!-- ⭐ JS 放最底（關鍵） -->
<script>

const bannerList = [
    { name: "劉揚安", img: "/images/luyanganhero-banner.jpg", pos: "center 20%" },
    { name: "EUNA", img: "/images/eunahero-banner.jpg", pos: "center 15%" },
    { name: "NØVEX", img: "/images/novexhero-banner.jpg", pos: "center 30%" },
    { name: "NÄXER", img: "/images/naxerhero-banner.jpg", pos: "center 35%" },
    { name: "JOAH", img: "/images/joahhero-banner.jpg", pos: "center 20%" },
    { name: "LILITHIUM", img: "/images/lilithiumhero-banner.jpg", pos: "center 25%" },
    { name: "GAIALYRA", img: "/images/gaialyrahero-banner.jpg", pos: "center 20%" },
    { name: "RÆNE", img: "/images/raenehero-banner.jpg", pos: "center 30%" },
    { name: "RAUN", img: "/images/raunhero-banner.jpg", pos: "center 15%" },
    { name: "VRAISY", img: "/images/vraisyhero-banner.jpg", pos: "center 25%" }
];

const img = document.getElementById("carousel-img");
const name = document.getElementById("artist-name");

let index = 0;

function showSlide(i) {
    const item = bannerList[i];

    img.style.opacity = "0";

    setTimeout(() => {
        img.src = item.img;
        img.style.objectPosition = item.pos;
        name.innerText = item.name;

        img.onload = () => {
            img.style.opacity = "1";
        };

    }, 500);
}

// ⭐ 初始化（保證不白）
img.src = bannerList[0].img;
img.style.objectPosition = bannerList[0].pos;
name.innerText = bannerList[0].name;

// ⭐ 輪播
setInterval(() => {
    index = (index + 1) % bannerList.length;
    showSlide(index);
}, 4000);

</script>

</body>
</html>
